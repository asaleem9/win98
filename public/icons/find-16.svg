<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Document -->
  <rect x="1" y="1" width="9" height="12" fill="#FFFFFF"/>
  <rect x="1" y="1" width="9" height="1" fill="#C0C0C0"/>
  <rect x="1" y="1" width="1" height="12" fill="#C0C0C0"/>
  <rect x="9" y="1" width="1" height="12" fill="#808080"/>
  <rect x="1" y="12" width="9" height="1" fill="#808080"/>
  <!-- Corner fold -->
  <rect x="7" y="1" width="3" height="3" fill="#C0C0C0"/>
  <!-- Text lines -->
  <rect x="3" y="5" width="5" height="1" fill="#000000"/>
  <rect x="3" y="7" width="6" height="1" fill="#000000"/>
  <rect x="3" y="9" width="4" height="1" fill="#000000"/>
  <!-- Magnifying glass -->
  <rect x="8" y="7" width="5" height="5" fill="#0000FF"/>
  <rect x="9" y="6" width="3" height="1" fill="#000000"/>
  <rect x="8" y="7" width="1" height="1" fill="#000000"/>
  <rect x="12" y="7" width="1" height="1" fill="#000000"/>
  <rect x="8" y="11" width="1" height="1" fill="#000000"/>
  <rect x="12" y="11" width="1" height="1" fill="#000000"/>
  <rect x="9" y="12" width="3" height="1" fill="#000000"/>
  <!-- Glass highlight -->
  <rect x="9" y="7" width="2" height="1" fill="#FFFFFF"/>
  <!-- Handle -->
  <rect x="12" y="12" width="2" height="1" fill="#808000"/>
  <rect x="13" y="13" width="2" height="2" fill="#808080"/>
</svg>