<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Folder tab -->
  <rect x="1" y="3" width="6" height="2" fill="#FFFF00"/>
  <rect x="1" y="3" width="6" height="1" fill="#FFFFFF"/>
  <rect x="1" y="3" width="1" height="2" fill="#FFFFFF"/>
  <!-- Folder body -->
  <rect x="1" y="5" width="14" height="9" fill="#FFFF00"/>
  <rect x="1" y="5" width="14" height="1" fill="#FFFFFF"/>
  <rect x="1" y="5" width="1" height="9" fill="#FFFFFF"/>
  <rect x="1" y="13" width="14" height="1" fill="#808080"/>
  <rect x="14" y="5" width="1" height="9" fill="#808080"/>
  <!-- Inner shadow -->
  <rect x="13" y="6" width="1" height="7" fill="#808000"/>
  <rect x="2" y="13" width="12" height="1" fill="#808000"/>
  <!-- Crease -->
  <rect x="2" y="7" width="12" height="1" fill="#808000"/>
