<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Folder back shadow -->
  <rect x="2" y="8" width="28" height="20" fill="#808000"/>
  <!-- Folder tab -->
  <rect x="2" y="6" width="12" height="3" fill="#FFFF00"/>
  <rect x="2" y="6" width="12" height="1" fill="#FFFFFF"/>
  <rect x="2" y="6" width="1" height="3" fill="#FFFFFF"/>
  <rect x="13" y="6" width="1" height="2" fill="#808000"/>
  <!-- Folder front face -->
  <rect x="2" y="9" width="28" height="19" fill="#FFFF00"/>
  <!-- Highlight top/left -->
  <rect x="2" y="9" width="28" height="1" fill="#FFFFFF"/>
  <rect x="2" y="9" width="1" height="19" fill="#FFFFFF"/>
  <!-- Shadow bottom/right -->
  <rect x="2" y="27" width="28" height="1" fill="#808080"/>
  <rect x="29" y="9" width="1" height="19" fill="#808080"/>
  <!-- Inner shadow -->
  <rect x="3" y="27" width="26" height="1" fill="#808000"/>
  <rect x="28" y="10" width="1" height="17" fill="#808000"/>
  <!-- Folder crease line -->
  <rect x="3" y="11" width="26" height="1" fill="#808000"/>
  <!-- Subtle depth lines -->
  <rect x="3" y="10" width="26" height="1" fill="#FFFF00"/>
</svg>