<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Paper body -->
  <rect x="4" y="2" width="20" height="28" fill="#FFFFFF"/>
  <!-- Paper border highlight -->
  <rect x="4" y="2" width="20" height="1" fill="#FFFFFF"/>
  <rect x="4" y="2" width="1" height="28" fill="#FFFFFF"/>
  <!-- Paper border shadow -->
  <rect x="23" y="2" width="1" height="28" fill="#808080"/>
  <rect x="4" y="29" width="20" height="1" fill="#808080"/>
  <!-- Blue title bar -->
  <rect x="5" y="3" width="18" height="4" fill="#000080"/>
  <!-- Text lines -->
  <rect x="7" y="9" width="14" height="1" fill="#000000"/>
  <rect x="7" y="12" width="12" height="1" fill="#000000"/>
  <rect x="7" y="15" width="14" height="1" fill="#000000"/>
  <rect x="7" y="18" width="10" height="1" fill="#000000"/>
  <rect x="7" y="21" width="13" height="1" fill="#000000"/>
  <rect x="7" y="24" width="8" height="1" fill="#000000"/>
  <!-- Pencil shaft -->
  <rect x="25" y="8" width="2" height="12" fill="#FFFF00"/>
  <!-- Pencil eraser -->
  <rect x="25" y="6" width="2" height="2" fill="#FF0000"/>
  <!-- Pencil ferrule -->
  <rect x="25" y="20" width="2" height="2" fill="#808080"/>
  <!-- Pencil tip -->
  <rect x="26" y="22" width="1" height="1" fill="#000000"/>
</svg>