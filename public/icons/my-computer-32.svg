<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Monitor body -->
  <rect x="4" y="2" width="24" height="17" fill="#C0C0C0"/>
  <rect x="4" y="2" width="24" height="1" fill="#FFFFFF"/>
  <rect x="4" y="2" width="1" height="17" fill="#FFFFFF"/>
  <rect x="4" y="18" width="24" height="1" fill="#808080"/>
  <rect x="27" y="2" width="1" height="17" fill="#808080"/>
  <!-- Screen bezel -->
  <rect x="6" y="4" width="20" height="12" fill="#808080"/>
  <rect x="7" y="5" width="18" height="1" fill="#000000"/>
  <rect x="7" y="5" width="1" height="10" fill="#000000"/>
  <!-- Blue screen -->
  <rect x="7" y="5" width="18" height="10" fill="#000080"/>
  <!-- Screen shine -->
  <rect x="8" y="6" width="4" height="1" fill="#0000FF"/>
  <rect x="8" y="7" width="1" height="2" fill="#0000FF"/>
  <!-- Screen inner highlight -->
  <rect x="24" y="5" width="1" height="10" fill="#C0C0C0"/>
  <rect x="7" y="14" width="18" height="1" fill="#C0C0C0"/>
  <!-- Power LED -->
  <rect x="15" y="16" width="2" height="1" fill="#00FF00"/>
  <!-- Monitor stand -->
  <rect x="12" y="19" width="8" height="2" fill="#C0C0C0"/>
  <rect x="12" y="19" width="8" height="1" fill="#FFFFFF"/>
  <rect x="12" y="20" width="8" height="1" fill="#808080"/>
  <!-- Base -->
  <rect x="10" y="21" width="12" height="2" fill="#C0C0C0"/>
  <rect x="10" y="21" width="12" height="1" fill="#FFFFFF"/>
  <rect x="10" y="22" width="12" height="1" fill="#808080"/>
  <!-- System unit -->
  <rect x="5" y="24" width="22" height="6" fill="#C0C0C0"/>
  <rect x="5" y="24" width="22" height="1" fill="#FFFFFF"/>
  <rect x="5" y="24" width="1" height="6" fill="#FFFFFF"/>
  <rect x="5" y="29" width="22" height="1" fill="#808080"/>
  <rect x="26" y="24" width="1" height="6" fill="#808080"/>
  <!-- Floppy slot -->
  <rect x="7" y="25" width="6" height="3" fill="#808080"/>
  <rect x="8" y="26" width="4" height="1" fill="#000000"/>
  <!-- CD drive -->
  <rect x="14" y="25" width="8" height="3" fill="#808080"/>
  <rect x="15" y="26" width="6" height="1" fill="#C0C0C0"/>
  <!-- Power button -->
  <rect x="24" y="26" width="2" height="2" fill="#808080"/>
  <rect x="24" y="26" width="2" height="1" fill="#000000"/>
</svg>