<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Speaker body -->
  <rect x="3" y="11" width="6" height="10" fill="#C0C0C0"/>
  <rect x="3" y="11" width="6" height="1" fill="#FFFFFF"/>
  <rect x="3" y="11" width="1" height="10" fill="#FFFFFF"/>
  <rect x="8" y="11" width="1" height="10" fill="#808080"/>
  <rect x="3" y="20" width="6" height="1" fill="#808080"/>
  <!-- Speaker cone -->
  <rect x="9" y="9" width="2" height="14" fill="#C0C0C0"/>
  <rect x="11" y="7" width="2" height="18" fill="#C0C0C0"/>
  <rect x="13" y="5" width="2" height="22" fill="#808080"/>
  <rect x="13" y="5" width="2" height="1" fill="#C0C0C0"/>
  <rect x="13" y="26" width="2" height="1" fill="#000000"/>
  <!-- Speaker cone circle -->
  <rect x="5" y="14" width="2" height="4" fill="#808080"/>
  <rect x="6" y="13" width="1" height="1" fill="#808080"/>
  <rect x="6" y="18" width="1" height="1" fill="#808080"/>
  <!-- Sound wave 1 -->
  <rect x="17" y="10" width="1" height="1" fill="#000000"/>
  <rect x="17" y="12" width="1" height="8" fill="#000000"/>
  <rect x="17" y="21" width="1" height="1" fill="#000000"/>
  <!-- Sound wave 2 -->
  <rect x="20" y="7" width="1" height="1" fill="#808080"/>
  <rect x="20" y="9" width="1" height="14" fill="#808080"/>
  <rect x="20" y="24" width="1" height="1" fill="#808080"/>
  <!-- Sound wave 3 -->
  <rect x="23" y="4" width="1" height="1" fill="#C0C0C0"/>
  <rect x="23" y="6" width="1" height="20" fill="#C0C0C0"/>
  <rect x="23" y="27" width="1" height="1" fill="#C0C0C0"/>
</svg>