<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Folder back -->
  <rect x="1" y="6" width="26" height="22" fill="#808000"/>
  <!-- Folder tab -->
  <rect x="1" y="4" width="12" height="3" fill="#FFFF00"/>
  <rect x="1" y="4" width="12" height="1" fill="#FFFFFF"/>
  <rect x="1" y="4" width="1" height="3" fill="#FFFFFF"/>
  <rect x="12" y="4" width="1" height="2" fill="#808000"/>
  <!-- Folder front -->
  <rect x="1" y="7" width="26" height="21" fill="#FFFF00"/>
  <rect x="1" y="7" width="26" height="1" fill="#FFFFFF"/>
  <rect x="1" y="7" width="1" height="21" fill="#FFFFFF"/>
  <rect x="1" y="27" width="26" height="1" fill="#808080"/>
  <rect x="26" y="7" width="1" height="21" fill="#808080"/>
  <!-- Magnifying glass handle -->
  <rect x="26" y="22" width="2" height="2" fill="#808000"/>
  <rect x="28" y="24" width="2" height="2" fill="#808000"/>
  <rect x="29" y="25" width="2" height="2" fill="#808080"/>
  <rect x="30" y="26" width="2" height="2" fill="#808080"/>
  <!-- Magnifying glass circle -->
  <rect x="19" y="12" width="10" height="10" fill="#000080"/>
  <rect x="21" y="11" width="6" height="1" fill="#C0C0C0"/>
  <rect x="19" y="12" width="1" height="2" fill="#C0C0C0"/>
  <rect x="20" y="12" width="1" height="1" fill="#C0C0C0"/>
  <rect x="28" y="12" width="1" height="2" fill="#808080"/>
  <rect x="19" y="19" width="1" height="2" fill="#C0C0C0"/>
  <rect x="28" y="19" width="1" height="2" fill="#808080"/>
  <rect x="21" y="22" width="6" height="1" fill="#808080"/>
  <rect x="20" y="21" width="1" height="1" fill="#808080"/>
  <!-- Glass interior (lighter blue) -->
  <rect x="21" y="13" width="6" height="7" fill="#0000FF"/>
  <rect x="20" y="14" width="1" height="5" fill="#0000FF"/>
  <rect x="27" y="14" width="1" height="5" fill="#0000FF"/>
  <!-- Glass highlight -->
  <rect x="21" y="13" width="3" height="1" fill="#FFFFFF"/>
  <rect x="20" y="14" width="1" height="2" fill="#FFFFFF"/>
</svg>