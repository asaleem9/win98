<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Document page background -->
  <rect x="4" y="2" width="22" height="28" fill="#FFFFFF"/>
  <!-- Document border -->
  <rect x="4" y="2" width="22" height="1" fill="#C0C0C0"/>
  <rect x="4" y="2" width="1" height="28" fill="#C0C0C0"/>
  <rect x="25" y="2" width="1" height="28" fill="#808080"/>
  <rect x="4" y="29" width="22" height="1" fill="#808080"/>
  <!-- Grid lines (spreadsheet) -->
  <rect x="6" y="7" width="18" height="1" fill="#C0C0C0"/>
  <rect x="6" y="11" width="18" height="1" fill="#C0C0C0"/>
  <rect x="6" y="15" width="18" height="1" fill="#C0C0C0"/>
  <rect x="6" y="19" width="18" height="1" fill="#C0C0C0"/>
  <rect x="6" y="23" width="18" height="1" fill="#C0C0C0"/>
  <rect x="6" y="27" width="18" height="1" fill="#C0C0C0"/>
  <!-- Vertical grid lines -->
  <rect x="12" y="7" width="1" height="21" fill="#C0C0C0"/>
  <rect x="18" y="7" width="1" height="21" fill="#C0C0C0"/>
  <!-- Green "X" overlaid -->
  <rect x="7" y="6" width="3" height="2" fill="#00FF00"/>
  <rect x="9" y="8" width="3" height="2" fill="#00FF00"/>
  <rect x="11" y="10" width="3" height="2" fill="#00FF00"/>
  <rect x="13" y="12" width="3" height="2" fill="#00FF00"/>
  <rect x="15" y="14" width="3" height="2" fill="#00FF00"/>
  <rect x="17" y="16" width="3" height="2" fill="#00FF00"/>
  <!-- X cross stroke -->
  <rect x="17" y="6" width="3" height="2" fill="#00FF00"/>
  <rect x="15" y="8" width="3" height="2" fill="#00FF00"/>
  <rect x="13" y="10" width="3" height="2" fill="#00FF00"/>
  <rect x="11" y="12" width="3" height="2" fill="#00FF00"/>
  <rect x="9" y="14" width="3" height="2" fill="#00FF00"/>
  <rect x="7" y="16" width="3" height="2" fill="#00FF00"/>
  <!-- Darker green shadow -->
  <rect x="7" y="6" width="1" height="2" fill="#008080"/>
  <rect x="17" y="6" width="1" height="2" fill="#008080"/>
  <rect x="9" y="16" width="1" height="2" fill="#008080"/>
  <rect x="19" y="16" width="1" height="2" fill="#008080"/>
  <!-- Highlight -->
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="6" width="1" height="1" fill="#FFFFFF"/>
</svg>