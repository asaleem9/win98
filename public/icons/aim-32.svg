<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Light background -->
  <rect width="32" height="32" fill="#FFFFFF"/>
  <rect x="0" y="0" width="32" height="1" fill="#C0C0C0"/>
  <rect x="0" y="0" width="1" height="32" fill="#C0C0C0"/>
  <!-- Yellow running man - head -->
  <rect x="13" y="2" width="4" height="4" fill="#FFFF00"/>
  <rect x="14" y="1" width="2" height="1" fill="#FFFF00"/>
  <rect x="13" y="2" width="1" height="1" fill="#808000"/>
  <!-- Eyes -->
  <rect x="14" y="3" width="1" height="1" fill="#000000"/>
  <rect x="16" y="3" width="1" height="1" fill="#000000"/>
  <!-- Body/torso -->
  <rect x="13" y="6" width="4" height="2" fill="#FFFF00"/>
  <rect x="12" y="8" width="6" height="2" fill="#FFFF00"/>
  <rect x="13" y="10" width="4" height="2" fill="#FFFF00"/>
  <rect x="13" y="12" width="4" height="2" fill="#FFFF00"/>
  <!-- Left arm reaching forward -->
  <rect x="8" y="8" width="4" height="2" fill="#FFFF00"/>
  <rect x="6" y="7" width="2" height="2" fill="#FFFF00"/>
  <rect x="6" y="7" width="1" height="1" fill="#808000"/>
  <!-- Right arm reaching back -->
  <rect x="18" y="8" width="4" height="2" fill="#FFFF00"/>
  <rect x="22" y="9" width="2" height="2" fill="#FFFF00"/>
  <rect x="23" y="10" width="1" height="1" fill="#808000"/>
  <!-- Left leg forward -->
  <rect x="10" y="14" width="3" height="2" fill="#FFFF00"/>
  <rect x="8" y="16" width="3" height="2" fill="#FFFF00"/>
  <rect x="6" y="18" width="3" height="2" fill="#FFFF00"/>
  <rect x="5" y="20" width="3" height="2" fill="#FFFF00"/>
  <rect x="4" y="22" width="4" height="2" fill="#808000"/>
  <!-- Right leg back -->
  <rect x="17" y="14" width="3" height="2" fill="#FFFF00"/>
  <rect x="19" y="16" width="3" height="2" fill="#FFFF00"/>
  <rect x="21" y="18" width="3" height="2" fill="#FFFF00"/>
  <rect x="22" y="20" width="3" height="2" fill="#FFFF00"/>
  <rect x="23" y="22" width="4" height="2" fill="#808000"/>
  <!-- Shadow highlights -->
  <rect x="12" y="8" width="1" height="6" fill="#808000"/>
  <rect x="8" y="8" width="1" height="1" fill="#808000"/>
  <!-- Ground shadow -->
  <rect x="4" y="24" width="6" height="1" fill="#C0C0C0"/>
  <rect x="22" y="24" width="6" height="1" fill="#C0C0C0"/>
  <rect x="10" y="26" width="12" height="1" fill="#C0C0C0"/>
</svg>