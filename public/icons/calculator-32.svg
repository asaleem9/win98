<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Calculator body -->
  <rect x="5" y="2" width="22" height="28" fill="#C0C0C0"/>
  <!-- Highlight top-left -->
  <rect x="5" y="2" width="22" height="1" fill="#FFFFFF"/>
  <rect x="5" y="2" width="1" height="28" fill="#FFFFFF"/>
  <!-- Shadow bottom-right -->
  <rect x="26" y="2" width="1" height="28" fill="#808080"/>
  <rect x="5" y="29" width="22" height="1" fill="#808080"/>
  <!-- LCD Display -->
  <rect x="7" y="4" width="18" height="5" fill="#000080"/>
  <rect x="8" y="5" width="16" height="3" fill="#008080"/>
  <!-- Display digits -->
  <rect x="18" y="6" width="5" height="1" fill="#000000"/>
  <!-- Button row 1 -->
  <rect x="7" y="11" width="4" height="3" fill="#FFFFFF"/>
  <rect x="12" y="11" width="4" height="3" fill="#FFFFFF"/>
  <rect x="17" y="11" width="4" height="3" fill="#FFFFFF"/>
  <rect x="22" y="11" width="4" height="3" fill="#808080"/>
  <!-- Button row 2 -->
  <rect x="7" y="15" width="4" height="3" fill="#FFFFFF"/>
  <rect x="12" y="15" width="4" height="3" fill="#FFFFFF"/>
  <rect x="17" y="15" width="4" height="3" fill="#FFFFFF"/>
  <rect x="22" y="15" width="4" height="3" fill="#808080"/>
  <!-- Button row 3 -->
  <rect x="7" y="19" width="4" height="3" fill="#FFFFFF"/>
  <rect x="12" y="19" width="4" height="3" fill="#FFFFFF"/>
  <rect x="17" y="19" width="4" height="3" fill="#FFFFFF"/>
  <rect x="22" y="19" width="4" height="3" fill="#808080"/>
  <!-- Button row 4 -->
  <rect x="7" y="23" width="4" height="3" fill="#FFFFFF"/>
  <rect x="12" y="23" width="4" height="3" fill="#FFFFFF"/>
  <rect x="17" y="23" width="4" height="3" fill="#FFFFFF"/>
  <rect x="22" y="23" width="4" height="3" fill="#0000FF"/>
  <!-- Button labels -->
  <rect x="9" y="12" width="1" height="1" fill="#000000"/>
  <rect x="14" y="12" width="1" height="1" fill="#000000"/>
  <rect x="19" y="12" width="1" height="1" fill="#000000"/>
  <rect x="9" y="16" width="1" height="1" fill="#000000"/>
  <rect x="14" y="16" width="1" height="1" fill="#000000"/>
  <rect x="19" y="16" width="1" height="1" fill="#000000"/>
  <rect x="9" y="20" width="1" height="1" fill="#000000"/>
  <rect x="14" y="20" width="1" height="1" fill="#000000"/>
  <rect x="19" y="20" width="1" height="1" fill="#000000"/>
  <rect x="9" y="24" width="1" height="1" fill="#000000"/>
  <rect x="14" y="24" width="1" height="1" fill="#000000"/>
  <rect x="23" y="24" width="2" height="1" fill="#FFFFFF"/>
</svg>