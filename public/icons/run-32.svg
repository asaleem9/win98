<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Window background -->
  <rect x="2" y="4" width="24" height="20" fill="#C0C0C0"/>
  <rect x="2" y="4" width="24" height="1" fill="#FFFFFF"/>
  <rect x="2" y="4" width="1" height="20" fill="#FFFFFF"/>
  <rect x="2" y="23" width="24" height="1" fill="#808080"/>
  <rect x="25" y="4" width="1" height="20" fill="#808080"/>
  <!-- Outer black border -->
  <rect x="2" y="24" width="24" height="1" fill="#000000"/>
  <rect x="26" y="4" width="1" height="21" fill="#000000"/>
  <!-- Title bar -->
  <rect x="3" y="5" width="22" height="3" fill="#000080"/>
  <!-- Window content area -->
  <rect x="3" y="8" width="22" height="14" fill="#FFFFFF"/>
  <rect x="3" y="8" width="22" height="1" fill="#808080"/>
  <rect x="3" y="8" width="1" height="14" fill="#808080"/>
  <!-- Text input line -->
  <rect x="5" y="12" width="18" height="3" fill="#FFFFFF"/>
  <rect x="5" y="12" width="18" height="1" fill="#808080"/>
  <rect x="5" y="12" width="1" height="3" fill="#808080"/>
  <rect x="22" y="12" width="1" height="3" fill="#C0C0C0"/>
  <rect x="5" y="14" width="18" height="1" fill="#C0C0C0"/>
  <!-- Text in input -->
  <rect x="6" y="13" width="8" height="1" fill="#000000"/>
  <!-- Green play arrow -->
  <rect x="16" y="16" width="2" height="1" fill="#00FF00"/>
  <rect x="16" y="17" width="4" height="1" fill="#00FF00"/>
  <rect x="16" y="18" width="6" height="1" fill="#00FF00"/>
  <rect x="16" y="19" width="8" height="1" fill="#00FF00"/>
  <rect x="16" y="20" width="6" height="1" fill="#00FF00"/>
  <rect x="16" y="21" width="4" height="1" fill="#00FF00"/>
  <rect x="16" y="22" width="2" height="1" fill="#00FF00"/>
  <!-- Arrow shadow -->
  <rect x="24" y="19" width="1" height="1" fill="#008080"/>
  <rect x="22" y="20" width="1" height="1" fill="#008080"/>
  <rect x="20" y="21" width="1" height="1" fill="#008080"/>
  <rect x="18" y="22" width="1" height="1" fill="#008080"/>
  <!-- OK button area -->
  <rect x="4" y="17" width="10" height="4" fill="#C0C0C0"/>
  <rect x="4" y="17" width="10" height="1" fill="#FFFFFF"/>
  <rect x="4" y="17" width="1" height="4" fill="#FFFFFF"/>
  <rect x="13" y="17" width="1" height="4" fill="#808080"/>
  <rect x="4" y="20" width="10" height="1" fill="#808080"/>
  <!-- OK text -->
  <rect x="7" y="18" width="4" height="2" fill="#000000"/>
</svg>