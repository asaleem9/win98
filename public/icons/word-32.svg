<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Document page background -->
  <rect x="4" y="2" width="22" height="28" fill="#FFFFFF"/>
  <!-- Document border -->
  <rect x="4" y="2" width="22" height="1" fill="#C0C0C0"/>
  <rect x="4" y="2" width="1" height="28" fill="#C0C0C0"/>
  <rect x="25" y="2" width="1" height="28" fill="#808080"/>
  <rect x="4" y="29" width="22" height="1" fill="#808080"/>
  <!-- Dog-ear fold top-right -->
  <rect x="22" y="2" width="4" height="1" fill="#C0C0C0"/>
  <rect x="23" y="3" width="3" height="1" fill="#C0C0C0"/>
  <rect x="24" y="4" width="2" height="1" fill="#C0C0C0"/>
  <rect x="22" y="2" width="1" height="4" fill="#808080"/>
  <!-- Text lines on document -->
  <rect x="7" y="8" width="16" height="1" fill="#C0C0C0"/>
  <rect x="7" y="11" width="14" height="1" fill="#C0C0C0"/>
  <rect x="7" y="14" width="16" height="1" fill="#C0C0C0"/>
  <rect x="7" y="17" width="12" height="1" fill="#C0C0C0"/>
  <rect x="7" y="20" width="16" height="1" fill="#C0C0C0"/>
  <rect x="7" y="23" width="10" height="1" fill="#C0C0C0"/>
  <!-- Blue "W" overlaid -->
  <rect x="6" y="6" width="2" height="14" fill="#000080"/>
  <rect x="8" y="16" width="2" height="4" fill="#000080"/>
  <rect x="10" y="14" width="2" height="4" fill="#000080"/>
  <rect x="12" y="12" width="2" height="4" fill="#000080"/>
  <rect x="14" y="14" width="2" height="4" fill="#000080"/>
  <rect x="16" y="16" width="2" height="4" fill="#000080"/>
  <rect x="18" y="6" width="2" height="14" fill="#000080"/>
  <!-- W highlight -->
  <rect x="6" y="6" width="2" height="1" fill="#0000FF"/>
  <rect x="18" y="6" width="2" height="1" fill="#0000FF"/>
  <rect x="6" y="6" width="1" height="14" fill="#0000FF"/>
  <!-- W shadow -->
  <rect x="19" y="7" width="1" height="13" fill="#000000"/>
  <rect x="8" y="19" width="2" height="1" fill="#000000"/>
  <rect x="16" y="19" width="2" height="1" fill="#000000"/>
</svg>