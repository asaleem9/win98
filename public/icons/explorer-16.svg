<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Folder tab -->
  <rect x="1" y="2" width="5" height="2" fill="#FFFF00"/>
  <rect x="1" y="2" width="5" height="1" fill="#FFFFFF"/>
  <!-- Folder body -->
  <rect x="1" y="4" width="12" height="10" fill="#FFFF00"/>
  <rect x="1" y="4" width="12" height="1" fill="#FFFFFF"/>
  <rect x="1" y="4" width="1" height="10" fill="#FFFFFF"/>
  <rect x="1" y="13" width="12" height="1" fill="#808080"/>
  <rect x="12" y="4" width="1" height="10" fill="#808080"/>
  <!-- Magnifying glass -->
  <rect x="9" y="7" width="5" height="5" fill="#0000FF"/>
  <rect x="10" y="6" width="3" height="1" fill="#C0C0C0"/>
  <rect x="9" y="7" width="1" height="1" fill="#C0C0C0"/>
  <rect x="10" y="11" width="3" height="1" fill="#808080"/>
  <rect x="13" y="10" width="1" height="1" fill="#808080"/>
  <!-- Glass highlight -->
  <rect x="10" y="7" width="2" height="1" fill="#FFFFFF"/>
  <!-- Handle -->
  <rect x="13" y="11" width="2" height="2" fill="#808000"/>
  <rect x="14" y="12" width="2" height="2" fill="#808080"/>
</svg>