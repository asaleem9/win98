<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Black outline -->
  <rect x="1" y="1" width="14" height="14" fill="#000000"/>
  <!-- Red (top-left) -->
  <rect x="2" y="2" width="5" height="5" fill="#FF0000"/>
  <!-- Green (top-right) -->
  <rect x="9" y="2" width="5" height="5" fill="#00FF00"/>
  <!-- Blue (bottom-left) -->
  <rect x="2" y="9" width="5" height="5" fill="#0000FF"/>
  <!-- Yellow (bottom-right) -->
  <rect x="9" y="9" width="5" height="5" fill="#FFFF00"/>
  <!-- Cross dividers -->
  <rect x="7" y="2" width="2" height="12" fill="#000000"/>
  <rect x="2" y="7" width="12" height="2" fill="#000000"/>
  <!-- Highlights -->
  <rect x="2" y="2" width="2" height="1" fill="#FFFFFF"/>
  <rect x="9" y="2" width="2" height="1" fill="#FFFFFF"/>
  <rect x="2" y="9" width="2" height="1" fill="#FFFFFF"/>
  <rect x="9" y="9" width="2" height="1" fill="#FFFFFF"/>
  <!-- Shadows -->
  <rect x="5" y="6" width="2" height="1" fill="#808080"/>
  <rect x="12" y="6" width="2" height="1" fill="#808080"/>
  <rect x="5" y="13" width="2" height="1" fill="#808080"/>
  <rect x="12" y="13" width="2" height="1" fill="#808080"/>
</svg>