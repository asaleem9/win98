<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Waving flag background shape -->
  <!-- Black outline -->
  <rect x="3" y="2" width="26" height="28" fill="#000000"/>
  <!-- Red quadrant (top-left) -->
  <rect x="4" y="3" width="12" height="12" fill="#FF0000"/>
  <!-- Wave distortion on red -->
  <rect x="5" y="3" width="11" height="1" fill="#FF0000"/>
  <rect x="4" y="4" width="12" height="2" fill="#FF0000"/>
  <rect x="5" y="6" width="11" height="3" fill="#FF0000"/>
  <rect x="4" y="9" width="12" height="6" fill="#FF0000"/>
  <!-- Green quadrant (top-right) -->
  <rect x="17" y="3" width="11" height="12" fill="#00FF00"/>
  <rect x="18" y="3" width="10" height="1" fill="#00FF00"/>
  <rect x="17" y="4" width="11" height="3" fill="#00FF00"/>
  <rect x="18" y="7" width="10" height="4" fill="#00FF00"/>
  <rect x="17" y="11" width="11" height="4" fill="#00FF00"/>
  <!-- Blue quadrant (bottom-left) -->
  <rect x="4" y="16" width="12" height="13" fill="#0000FF"/>
  <rect x="5" y="16" width="11" height="2" fill="#0000FF"/>
  <rect x="4" y="18" width="12" height="4" fill="#0000FF"/>
  <rect x="5" y="22" width="11" height="3" fill="#0000FF"/>
  <rect x="4" y="25" width="12" height="4" fill="#0000FF"/>
  <!-- Yellow quadrant (bottom-right) -->
  <rect x="17" y="16" width="11" height="13" fill="#FFFF00"/>
  <rect x="18" y="16" width="10" height="3" fill="#FFFF00"/>
  <rect x="17" y="19" width="11" height="3" fill="#FFFF00"/>
  <rect x="18" y="22" width="10" height="3" fill="#FFFF00"/>
  <rect x="17" y="25" width="11" height="4" fill="#FFFF00"/>
  <!-- Cross dividers -->
  <rect x="4" y="15" width="24" height="1" fill="#000000"/>
  <rect x="16" y="3" width="1" height="26" fill="#000000"/>
  <!-- Wave highlights (lighter shading) -->
  <rect x="5" y="4" width="3" height="1" fill="#FFFFFF"/>
  <rect x="18" y="4" width="3" height="1" fill="#FFFFFF"/>
  <rect x="5" y="17" width="3" height="1" fill="#FFFFFF"/>
  <rect x="18" y="17" width="3" height="1" fill="#FFFFFF"/>
  <!-- Wave shadows (darker) -->
  <rect x="12" y="13" width="3" height="1" fill="#808080"/>
  <rect x="24" y="13" width="3" height="1" fill="#808080"/>
  <rect x="12" y="27" width="3" height="1" fill="#808080"/>
  <rect x="24" y="27" width="3" height="1" fill="#808080"/>
</svg>