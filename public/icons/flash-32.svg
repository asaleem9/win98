<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Red background -->
  <rect width="32" height="32" fill="#FF0000"/>
  <rect x="0" y="0" width="32" height="1" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1" height="32" fill="#FFFFFF"/>
  <rect x="31" y="0" width="1" height="32" fill="#808080"/>
  <rect x="0" y="31" width="32" height="1" fill="#808080"/>
  <rect x="1" y="1" width="30" height="30" fill="#FF0000"/>
  <!-- Macromedia "F" letter in white -->
  <rect x="8" y="5" width="16" height="2" fill="#FFFFFF"/>
  <rect x="8" y="7" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="9" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="11" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="13" width="14" height="2" fill="#FFFFFF"/>
  <rect x="8" y="15" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="17" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="19" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="21" width="4" height="2" fill="#FFFFFF"/>
  <rect x="8" y="23" width="4" height="2" fill="#FFFFFF"/>
  <!-- Lightning bolt accent overlaying the F -->
  <rect x="18" y="7" width="2" height="2" fill="#FFFF00"/>
  <rect x="16" y="9" width="2" height="2" fill="#FFFF00"/>
  <rect x="14" y="11" width="6" height="2" fill="#FFFF00"/>
  <rect x="18" y="15" width="2" height="2" fill="#FFFF00"/>
  <rect x="16" y="17" width="2" height="2" fill="#FFFF00"/>
  <rect x="14" y="19" width="2" height="2" fill="#FFFF00"/>
  <!-- Shadow on F -->
  <rect x="11" y="7" width="1" height="18" fill="#C0C0C0"/>
  <rect x="8" y="5" width="16" height="1" fill="#C0C0C0"/>
</svg>