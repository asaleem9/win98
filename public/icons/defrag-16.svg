<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Frame -->
  <rect x="1" y="1" width="14" height="14" fill="#C0C0C0"/>
  <rect x="1" y="1" width="14" height="1" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1" height="14" fill="#FFFFFF"/>
  <rect x="14" y="1" width="1" height="14" fill="#808080"/>
  <rect x="1" y="14" width="14" height="1" fill="#808080"/>
  <!-- Grid background -->
  <rect x="2" y="2" width="12" height="12" fill="#000000"/>
  <!-- Fragmented row 1 -->
  <rect x="2" y="2" width="2" height="2" fill="#0000FF"/>
  <rect x="4" y="2" width="2" height="2" fill="#FF0000"/>
  <rect x="6" y="2" width="2" height="2" fill="#0000FF"/>
  <rect x="8" y="2" width="2" height="2" fill="#00FF00"/>
  <rect x="10" y="2" width="2" height="2" fill="#FF0000"/>
  <rect x="12" y="2" width="2" height="2" fill="#0000FF"/>
  <!-- Row 2 -->
  <rect x="2" y="4" width="2" height="2" fill="#00FF00"/>
  <rect x="4" y="4" width="2" height="2" fill="#0000FF"/>
  <rect x="6" y="4" width="2" height="2" fill="#FF0000"/>
  <rect x="8" y="4" width="2" height="2" fill="#0000FF"/>
  <rect x="10" y="4" width="2" height="2" fill="#00FF00"/>
  <rect x="12" y="4" width="2" height="2" fill="#0000FF"/>
  <!-- Row 3 - defragged -->
  <rect x="2" y="6" width="2" height="2" fill="#0000FF"/>
  <rect x="4" y="6" width="2" height="2" fill="#0000FF"/>
  <rect x="6" y="6" width="2" height="2" fill="#0000FF"/>
  <rect x="8" y="6" width="2" height="2" fill="#00FF00"/>
  <rect x="10" y="6" width="2" height="2" fill="#00FF00"/>
  <rect x="12" y="6" width="2" height="2" fill="#FF0000"/>
  <!-- Row 4 - defragged -->
  <rect x="2" y="8" width="2" height="2" fill="#0000FF"/>
  <rect x="4" y="8" width="2" height="2" fill="#0000FF"/>
  <rect x="6" y="8" width="2" height="2" fill="#00FF00"/>
  <rect x="8" y="8" width="2" height="2" fill="#FF0000"/>
  <rect x="10" y="8" width="2" height="2" fill="#FF0000"/>
  <!-- Row 5 - empty -->
  <rect x="2" y="10" width="2" height="2" fill="#0000FF"/>
  <rect x="4" y="10" width="2" height="2" fill="#00FF00"/>
</svg>