<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Green background -->
  <rect x="0" y="0" width="32" height="32" fill="#008080"/>
  <!-- Card body -->
  <rect x="5" y="3" width="22" height="26" fill="#FFFFFF"/>
  <!-- Card shadow -->
  <rect x="26" y="3" width="1" height="26" fill="#808080"/>
  <rect x="5" y="28" width="22" height="1" fill="#808080"/>
  <!-- Large center spade -->
  <rect x="15" y="10" width="2" height="1" fill="#000000"/>
  <rect x="14" y="11" width="4" height="1" fill="#000000"/>
  <rect x="13" y="12" width="6" height="1" fill="#000000"/>
  <rect x="12" y="13" width="8" height="1" fill="#000000"/>
  <rect x="11" y="14" width="10" height="1" fill="#000000"/>
  <rect x="11" y="15" width="10" height="1" fill="#000000"/>
  <rect x="11" y="16" width="10" height="1" fill="#000000"/>
  <rect x="12" y="17" width="8" height="1" fill="#000000"/>
  <rect x="13" y="18" width="2" height="1" fill="#000000"/>
  <rect x="17" y="18" width="2" height="1" fill="#000000"/>
  <!-- Spade stem -->
  <rect x="15" y="18" width="2" height="3" fill="#000000"/>
  <rect x="14" y="21" width="4" height="1" fill="#000000"/>
  <!-- A letter top-left -->
  <rect x="8" y="5" width="3" height="1" fill="#000000"/>
  <rect x="7" y="6" width="1" height="3" fill="#000000"/>
  <rect x="11" y="6" width="1" height="3" fill="#000000"/>
  <rect x="8" y="8" width="3" height="1" fill="#000000"/>
  <rect x="7" y="9" width="1" height="2" fill="#000000"/>
  <rect x="11" y="9" width="1" height="2" fill="#000000"/>
</svg>