<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Palette body -->
  <rect x="2" y="6" width="23" height="22" fill="#C0C0C0"/>
  <rect x="4" y="4" width="19" height="2" fill="#C0C0C0"/>
  <!-- Highlight -->
  <rect x="2" y="6" width="1" height="22" fill="#FFFFFF"/>
  <rect x="4" y="4" width="19" height="1" fill="#FFFFFF"/>
  <!-- Shadow -->
  <rect x="24" y="6" width="1" height="22" fill="#808080"/>
  <rect x="4" y="27" width="19" height="1" fill="#808080"/>
  <!-- Palette hole -->
  <rect x="6" y="18" width="4" height="4" fill="#808080"/>
  <rect x="7" y="19" width="2" height="2" fill="#000000"/>
  <!-- Paint blobs -->
  <rect x="5" y="7" width="4" height="3" fill="#FF0000"/>
  <rect x="11" y="6" width="4" height="3" fill="#0000FF"/>
  <rect x="17" y="7" width="4" height="3" fill="#00FF00"/>
  <rect x="6" y="12" width="3" height="3" fill="#FFFF00"/>
  <rect x="13" y="11" width="4" height="3" fill="#800080"/>
  <rect x="19" y="13" width="3" height="3" fill="#FF0000"/>
  <rect x="12" y="20" width="4" height="3" fill="#008080"/>
  <rect x="18" y="19" width="3" height="3" fill="#808000"/>
  <!-- Paintbrush handle -->
  <rect x="25" y="2" width="2" height="10" fill="#808000"/>
  <rect x="24" y="1" width="4" height="1" fill="#808000"/>
  <!-- Brush ferrule -->
  <rect x="25" y="12" width="2" height="3" fill="#808080"/>
  <!-- Brush tip -->
  <rect x="25" y="15" width="2" height="2" fill="#000000"/>
  <rect x="26" y="17" width="1" height="1" fill="#FF0000"/>
</svg>