<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Speaker body -->
  <rect x="1" y="5" width="3" height="6" fill="#C0C0C0"/>
  <rect x="1" y="5" width="3" height="1" fill="#FFFFFF"/>
  <rect x="1" y="5" width="1" height="6" fill="#FFFFFF"/>
  <rect x="3" y="10" width="1" height="1" fill="#808080"/>
  <!-- Speaker cone -->
  <rect x="4" y="4" width="1" height="8" fill="#C0C0C0"/>
  <rect x="5" y="3" width="1" height="10" fill="#C0C0C0"/>
  <rect x="6" y="2" width="1" height="12" fill="#808080"/>
  <!-- Sound wave 1 -->
  <rect x="8" y="5" width="1" height="6" fill="#000000"/>
  <!-- Sound wave 2 -->
  <rect x="10" y="3" width="1" height="10" fill="#808080"/>
  <!-- Sound wave 3 -->
  <rect x="12" y="2" width="1" height="12" fill="#C0C0C0"/>
