<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Document page background -->
  <rect x="4" y="2" width="22" height="28" fill="#FFFFFF"/>
  <!-- Document border -->
  <rect x="4" y="2" width="22" height="1" fill="#C0C0C0"/>
  <rect x="4" y="2" width="1" height="28" fill="#C0C0C0"/>
  <rect x="25" y="2" width="1" height="28" fill="#808080"/>
  <rect x="4" y="29" width="22" height="1" fill="#808080"/>
  <!-- Slide area (inner rectangle) -->
  <rect x="7" y="6" width="16" height="12" fill="#FFFFFF"/>
  <rect x="7" y="6" width="16" height="1" fill="#C0C0C0"/>
  <rect x="7" y="6" width="1" height="12" fill="#C0C0C0"/>
  <rect x="22" y="6" width="1" height="12" fill="#808080"/>
  <rect x="7" y="17" width="16" height="1" fill="#808080"/>
  <!-- Text lines below slide -->
  <rect x="7" y="21" width="16" height="1" fill="#C0C0C0"/>
  <rect x="7" y="24" width="12" height="1" fill="#C0C0C0"/>
  <rect x="7" y="27" width="14" height="1" fill="#C0C0C0"/>
  <!-- Orange/Red "P" -->
  <rect x="8" y="5" width="3" height="14" fill="#FF0000"/>
  <rect x="11" y="5" width="6" height="2" fill="#FF0000"/>
  <rect x="17" y="5" width="3" height="2" fill="#FF0000"/>
  <rect x="17" y="7" width="3" height="2" fill="#FF0000"/>
  <rect x="17" y="9" width="3" height="2" fill="#FF0000"/>
  <rect x="11" y="11" width="6" height="2" fill="#FF0000"/>
  <!-- Highlight -->
  <rect x="8" y="5" width="12" height="1" fill="#FFFF00"/>
  <rect x="8" y="5" width="1" height="14" fill="#FFFF00"/>
  <!-- Shadow -->
  <rect x="19" y="6" width="1" height="7" fill="#808000"/>
  <rect x="10" y="18" width="1" height="1" fill="#808080"/>
</svg>