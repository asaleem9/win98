<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Left computer monitor -->
  <rect x="1" y="4" width="12" height="10" fill="#C0C0C0"/>
  <rect x="1" y="4" width="12" height="1" fill="#FFFFFF"/>
  <rect x="1" y="4" width="1" height="10" fill="#FFFFFF"/>
  <rect x="12" y="4" width="1" height="10" fill="#808080"/>
  <rect x="1" y="13" width="12" height="1" fill="#808080"/>
  <!-- Left screen -->
  <rect x="3" y="6" width="8" height="6" fill="#000080"/>
  <rect x="3" y="6" width="8" height="1" fill="#808080"/>
  <rect x="3" y="6" width="1" height="6" fill="#808080"/>
  <!-- Left stand -->
  <rect x="5" y="14" width="4" height="1" fill="#C0C0C0"/>
  <rect x="4" y="15" width="6" height="1" fill="#808080"/>
  <!-- Left system unit -->
  <rect x="2" y="17" width="10" height="4" fill="#C0C0C0"/>
  <rect x="2" y="17" width="10" height="1" fill="#FFFFFF"/>
  <rect x="2" y="17" width="1" height="4" fill="#FFFFFF"/>
  <rect x="11" y="17" width="1" height="4" fill="#808080"/>
  <rect x="2" y="20" width="10" height="1" fill="#808080"/>
  <!-- Right computer monitor -->
  <rect x="19" y="4" width="12" height="10" fill="#C0C0C0"/>
  <rect x="19" y="4" width="12" height="1" fill="#FFFFFF"/>
  <rect x="19" y="4" width="1" height="10" fill="#FFFFFF"/>
  <rect x="30" y="4" width="1" height="10" fill="#808080"/>
  <rect x="19" y="13" width="12" height="1" fill="#808080"/>
  <!-- Right screen -->
  <rect x="21" y="6" width="8" height="6" fill="#000080"/>
  <rect x="21" y="6" width="8" height="1" fill="#808080"/>
  <rect x="21" y="6" width="1" height="6" fill="#808080"/>
  <!-- Right stand -->
  <rect x="23" y="14" width="4" height="1" fill="#C0C0C0"/>
  <rect x="22" y="15" width="6" height="1" fill="#808080"/>
  <!-- Right system unit -->
  <rect x="20" y="17" width="10" height="4" fill="#C0C0C0"/>
  <rect x="20" y="17" width="10" height="1" fill="#FFFFFF"/>
  <rect x="20" y="17" width="1" height="4" fill="#FFFFFF"/>
  <rect x="29" y="17" width="1" height="4" fill="#808080"/>
  <rect x="20" y="20" width="10" height="1" fill="#808080"/>
  <!-- Cable connecting them -->
  <rect x="12" y="18" width="8" height="2" fill="#000000"/>
  <rect x="12" y="18" width="8" height="1" fill="#808080"/>
  <!-- Cable connector dots -->
  <rect x="13" y="19" width="1" height="1" fill="#FFFF00"/>
  <rect x="18" y="19" width="1" height="1" fill="#FFFF00"/>
  <!-- Network label area -->
  <rect x="10" y="24" width="12" height="5" fill="#000080"/>
  <rect x="10" y="24" width="12" height="1" fill="#0000FF"/>
  <rect x="10" y="24" width="1" height="5" fill="#0000FF"/>
  <rect x="21" y="24" width="1" height="5" fill="#000000"/>
  <rect x="10" y="28" width="12" height="1" fill="#000000"/>
  <!-- Globe on label -->
  <rect x="13" y="25" width="6" height="3" fill="#008080"/>
  <rect x="14" y="25" width="4" height="1" fill="#00FF00"/>
  <rect x="13" y="26" width="6" height="1" fill="#00FF00"/>
  <rect x="14" y="27" width="4" height="1" fill="#00FF00"/>
</svg>