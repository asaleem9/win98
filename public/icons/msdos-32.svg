<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Window frame -->
  <rect x="2" y="2" width="28" height="28" fill="#000000"/>
  <!-- Title bar -->
  <rect x="2" y="2" width="28" height="4" fill="#000080"/>
  <rect x="2" y="2" width="28" height="1" fill="#0000FF"/>
  <!-- Title bar dots -->
  <rect x="5" y="3" width="1" height="2" fill="#FFFFFF"/>
  <rect x="7" y="3" width="1" height="2" fill="#FFFFFF"/>
  <rect x="9" y="3" width="1" height="2" fill="#FFFFFF"/>
  <rect x="11" y="3" width="1" height="2" fill="#FFFFFF"/>
  <!-- Close button -->
  <rect x="26" y="3" width="3" height="2" fill="#C0C0C0"/>
  <!-- C:\> prompt -->
  <rect x="4" y="8" width="4" height="1" fill="#C0C0C0"/>
  <rect x="4" y="9" width="1" height="3" fill="#C0C0C0"/>
  <rect x="4" y="12" width="4" height="1" fill="#C0C0C0"/>
  <rect x="9" y="9" width="1" height="1" fill="#C0C0C0"/>
  <rect x="9" y="11" width="1" height="1" fill="#C0C0C0"/>
  <rect x="11" y="8" width="1" height="1" fill="#C0C0C0"/>
  <rect x="12" y="9" width="1" height="1" fill="#C0C0C0"/>
  <rect x="13" y="10" width="1" height="1" fill="#C0C0C0"/>
  <rect x="14" y="11" width="1" height="1" fill="#C0C0C0"/>
  <rect x="15" y="12" width="1" height="1" fill="#C0C0C0"/>
  <rect x="17" y="8" width="1" height="1" fill="#C0C0C0"/>
  <rect x="18" y="9" width="1" height="1" fill="#C0C0C0"/>
  <rect x="19" y="10" width="1" height="1" fill="#C0C0C0"/>
  <rect x="18" y="11" width="1" height="1" fill="#C0C0C0"/>
  <rect x="17" y="12" width="1" height="1" fill="#C0C0C0"/>
  <!-- Blinking cursor -->
  <rect x="21" y="11" width="3" height="2" fill="#FFFFFF"/>
  <!-- Previous command output -->
  <rect x="4" y="16" width="14" height="1" fill="#808080"/>
  <rect x="4" y="19" width="10" height="1" fill="#808080"/>
  <rect x="4" y="22" width="16" height="1" fill="#808080"/>
</svg>