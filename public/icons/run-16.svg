  <rect x="1" y="1" width="12" height="1" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1" height="11" fill="#FFFFFF"/>
  <rect x="12" y="1" width="1" height="11" fill="#808080"/>
  <rect x="1" y="11" width="12" height="1" fill="#808080"/>
