<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Panel background -->
  <rect x="2" y="2" width="28" height="28" fill="#C0C0C0"/>
  <rect x="2" y="2" width="28" height="1" fill="#FFFFFF"/>
  <rect x="2" y="2" width="1" height="28" fill="#FFFFFF"/>
  <rect x="2" y="29" width="28" height="1" fill="#808080"/>
  <rect x="29" y="2" width="1" height="28" fill="#808080"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="26" height="1" fill="#C0C0C0"/>
  <rect x="3" y="28" width="26" height="1" fill="#000000"/>
  <rect x="28" y="3" width="1" height="26" fill="#000000"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="24" height="3" fill="#000080"/>
  <!-- Slider 1 - Red -->
  <rect x="6" y="9" width="3" height="14" fill="#808080"/>
  <rect x="6" y="9" width="3" height="1" fill="#000000"/>
  <rect x="6" y="9" width="1" height="14" fill="#000000"/>
  <rect x="8" y="9" width="1" height="14" fill="#FFFFFF"/>
  <rect x="6" y="22" width="3" height="1" fill="#FFFFFF"/>
  <rect x="5" y="11" width="5" height="3" fill="#FF0000"/>
  <rect x="5" y="11" width="5" height="1" fill="#FFFFFF"/>
  <rect x="5" y="13" width="5" height="1" fill="#808080"/>
  <!-- Slider 2 - Green -->
  <rect x="12" y="9" width="3" height="14" fill="#808080"/>
  <rect x="12" y="9" width="3" height="1" fill="#000000"/>
  <rect x="12" y="9" width="1" height="14" fill="#000000"/>
  <rect x="14" y="9" width="1" height="14" fill="#FFFFFF"/>
  <rect x="12" y="22" width="3" height="1" fill="#FFFFFF"/>
  <rect x="11" y="15" width="5" height="3" fill="#00FF00"/>
  <rect x="11" y="15" width="5" height="1" fill="#FFFFFF"/>
  <rect x="11" y="17" width="5" height="1" fill="#808080"/>
  <!-- Slider 3 - Blue -->
  <rect x="18" y="9" width="3" height="14" fill="#808080"/>
  <rect x="18" y="9" width="3" height="1" fill="#000000"/>
  <rect x="18" y="9" width="1" height="14" fill="#000000"/>
  <rect x="20" y="9" width="1" height="14" fill="#FFFFFF"/>
  <rect x="18" y="22" width="3" height="1" fill="#FFFFFF"/>
  <rect x="17" y="13" width="5" height="3" fill="#0000FF"/>
  <rect x="17" y="13" width="5" height="1" fill="#FFFFFF"/>
  <rect x="17" y="15" width="5" height="1" fill="#808080"/>
  <!-- Toggle/checkbox area -->
  <rect x="24" y="10" width="4" height="4" fill="#FFFFFF"/>
  <rect x="24" y="10" width="4" height="1" fill="#808080"/>
  <rect x="24" y="10" width="1" height="4" fill="#808080"/>
  <rect x="25" y="11" width="2" height="2" fill="#000000"/>
  <rect x="24" y="16" width="4" height="4" fill="#FFFFFF"/>
  <rect x="24" y="16" width="4" height="1" fill="#808080"/>
  <rect x="24" y="16" width="1" height="4" fill="#808080"/>
  <!-- Bottom status -->
  <rect x="4" y="25" width="24" height="3" fill="#C0C0C0"/>
  <rect x="4" y="25" width="24" height="1" fill="#808080"/>
  <rect x="4" y="25" width="1" height="3" fill="#808080"/>
</svg>