<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Bin lid -->
  <rect x="8" y="2" width="16" height="3" fill="#808080"/>
  <rect x="8" y="2" width="16" height="1" fill="#C0C0C0"/>
  <rect x="8" y="2" width="1" height="3" fill="#C0C0C0"/>
  <rect x="23" y="2" width="1" height="3" fill="#000000"/>
  <rect x="8" y="4" width="16" height="1" fill="#000000"/>
  <!-- Lid handle -->
  <rect x="13" y="1" width="6" height="1" fill="#808080"/>
  <rect x="13" y="1" width="6" height="1" fill="#C0C0C0"/>
  <!-- Bin body - tapered -->
  <rect x="7" y="5" width="18" height="1" fill="#C0C0C0"/>
  <rect x="8" y="6" width="16" height="22" fill="#808080"/>
  <!-- Body highlights -->
  <rect x="8" y="6" width="1" height="22" fill="#C0C0C0"/>
  <rect x="8" y="6" width="16" height="1" fill="#C0C0C0"/>
  <!-- Body shadow -->
  <rect x="23" y="6" width="1" height="22" fill="#000000"/>
  <rect x="8" y="27" width="16" height="1" fill="#000000"/>
  <!-- Taper left -->
  <rect x="7" y="5" width="1" height="4" fill="#C0C0C0"/>
  <rect x="24" y="5" width="1" height="4" fill="#808080"/>
  <!-- Vertical ridges -->
  <rect x="11" y="8" width="1" height="18" fill="#C0C0C0"/>
  <rect x="12" y="8" width="1" height="18" fill="#000000"/>
  <rect x="15" y="8" width="1" height="18" fill="#C0C0C0"/>
  <rect x="16" y="8" width="1" height="18" fill="#000000"/>
  <rect x="19" y="8" width="1" height="18" fill="#C0C0C0"/>
  <rect x="20" y="8" width="1" height="18" fill="#000000"/>
  <!-- Recycling arrows (simplified) -->
  <!-- Arrow 1 - green -->
  <rect x="13" y="13" width="3" height="1" fill="#00FF00"/>
  <rect x="15" y="12" width="1" height="1" fill="#00FF00"/>
  <rect x="16" y="13" width="1" height="3" fill="#00FF00"/>
  <!-- Arrow 2 -->
  <rect x="13" y="17" width="1" height="3" fill="#00FF00"/>
  <rect x="14" y="19" width="3" height="1" fill="#00FF00"/>
  <rect x="14" y="18" width="1" height="1" fill="#00FF00"/>
  <!-- Base -->
  <rect x="9" y="28" width="14" height="2" fill="#808080"/>
  <rect x="9" y="28" width="14" height="1" fill="#C0C0C0"/>
  <rect x="9" y="29" width="14" height="1" fill="#000000"/>
</svg>