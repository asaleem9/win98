<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Light background -->
  <rect width="16" height="16" fill="#FFFFFF"/>
  <!-- Yellow running man simplified - head -->
  <rect x="7" y="1" width="2" height="2" fill="#FFFF00"/>
  <rect x="7" y="1" width="1" height="1" fill="#808000"/>
  <!-- Body -->
  <rect x="7" y="3" width="2" height="3" fill="#FFFF00"/>
  <!-- Left arm -->
  <rect x="4" y="4" width="3" height="1" fill="#FFFF00"/>
  <rect x="4" y="4" width="1" height="1" fill="#808000"/>
  <!-- Right arm -->
  <rect x="9" y="4" width="3" height="1" fill="#FFFF00"/>
  <rect x="11" y="5" width="1" height="1" fill="#808000"/>
  <!-- Left leg forward -->
  <rect x="5" y="6" width="2" height="1" fill="#FFFF00"/>
  <rect x="4" y="7" width="2" height="1" fill="#FFFF00"/>
  <rect x="3" y="8" width="2" height="1" fill="#FFFF00"/>
  <rect x="2" y="9" width="2" height="1" fill="#FFFF00"/>
  <rect x="1" y="10" width="3" height="1" fill="#808000"/>
  <!-- Right leg back -->
  <rect x="9" y="6" width="2" height="1" fill="#FFFF00"/>
  <rect x="10" y="7" width="2" height="1" fill="#FFFF00"/>
  <rect x="11" y="8" width="2" height="1" fill="#FFFF00"/>
  <rect x="12" y="9" width="2" height="1" fill="#FFFF00"/>
  <rect x="12" y="10" width="3" height="1" fill="#808000"/>
  <!-- Shadow -->
  <rect x="4" y="12" width="8" height="1" fill="#C0C0C0"/>
</svg>