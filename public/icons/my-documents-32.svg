<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Folder back -->
  <rect x="2" y="6" width="28" height="22" fill="#808000"/>
  <!-- Folder tab -->
  <rect x="2" y="4" width="12" height="3" fill="#FFFF00"/>
  <rect x="2" y="4" width="12" height="1" fill="#FFFFFF"/>
  <rect x="2" y="4" width="1" height="3" fill="#FFFFFF"/>
  <rect x="13" y="4" width="1" height="2" fill="#808000"/>
  <!-- Folder front face -->
  <rect x="2" y="7" width="28" height="21" fill="#FFFF00"/>
  <rect x="2" y="7" width="28" height="1" fill="#FFFFFF"/>
  <rect x="2" y="7" width="1" height="21" fill="#FFFFFF"/>
  <rect x="2" y="27" width="28" height="1" fill="#808080"/>
  <rect x="29" y="7" width="1" height="21" fill="#808080"/>
  <!-- Document sticking out -->
  <rect x="18" y="2" width="10" height="13" fill="#FFFFFF"/>
  <rect x="18" y="2" width="10" height="1" fill="#C0C0C0"/>
  <rect x="27" y="2" width="1" height="13" fill="#808080"/>
  <!-- Document corner fold -->
  <rect x="24" y="2" width="4" height="4" fill="#C0C0C0"/>
  <rect x="24" y="2" width="1" height="4" fill="#808080"/>
  <rect x="24" y="5" width="4" height="1" fill="#808080"/>
  <!-- Document lines -->
  <rect x="20" y="7" width="6" height="1" fill="#000000"/>
  <rect x="20" y="9" width="6" height="1" fill="#000000"/>
  <rect x="20" y="11" width="4" height="1" fill="#000000"/>
  <!-- Folder detail lines -->
  <rect x="4" y="12" width="12" height="1" fill="#808000"/>
  <rect x="4" y="16" width="16" height="1" fill="#808000"/>
  <rect x="4" y="20" width="18" height="1" fill="#808000"/>
  <rect x="4" y="24" width="20" height="1" fill="#808000"/>
</svg>