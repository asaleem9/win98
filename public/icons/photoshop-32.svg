<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Dark blue background -->
  <rect width="32" height="32" fill="#000080"/>
  <rect x="1" y="1" width="30" height="30" fill="#000080"/>
  <rect x="0" y="0" width="32" height="1" fill="#0000FF"/>
  <rect x="0" y="0" width="1" height="32" fill="#0000FF"/>
  <rect x="31" y="0" width="1" height="32" fill="#000000"/>
  <rect x="0" y="31" width="32" height="1" fill="#000000"/>
  <!-- Eye icon - white of eye (oval shape) -->
  <rect x="6" y="12" width="20" height="2" fill="#FFFFFF"/>
  <rect x="4" y="14" width="24" height="2" fill="#FFFFFF"/>
  <rect x="3" y="16" width="26" height="2" fill="#FFFFFF"/>
  <rect x="4" y="18" width="24" height="2" fill="#FFFFFF"/>
  <rect x="6" y="20" width="20" height="2" fill="#FFFFFF"/>
  <rect x="8" y="10" width="16" height="2" fill="#FFFFFF"/>
  <rect x="8" y="22" width="16" height="2" fill="#FFFFFF"/>
  <rect x="10" y="8" width="12" height="2" fill="#C0C0C0"/>
  <rect x="10" y="24" width="12" height="2" fill="#C0C0C0"/>
  <!-- Iris (blue circle) -->
  <rect x="12" y="12" width="8" height="2" fill="#0000FF"/>
  <rect x="11" y="14" width="10" height="2" fill="#0000FF"/>
  <rect x="11" y="16" width="10" height="2" fill="#0000FF"/>
  <rect x="12" y="18" width="8" height="2" fill="#0000FF"/>
  <!-- Pupil (black) -->
  <rect x="14" y="14" width="4" height="2" fill="#000000"/>
  <rect x="14" y="16" width="4" height="2" fill="#000000"/>
  <!-- Pupil highlight -->
  <rect x="15" y="14" width="2" height="1" fill="#FFFFFF"/>
  <!-- Eyelid shadow top -->
  <rect x="8" y="10" width="16" height="1" fill="#808080"/>
  <rect x="6" y="12" width="2" height="1" fill="#808080"/>
  <!-- Eyelid shadow bottom -->
  <rect x="8" y="23" width="16" height="1" fill="#808080"/>
  <!-- Upper eyelid line -->
  <rect x="12" y="7" width="8" height="1" fill="#C0C0C0"/>
  <rect x="10" y="8" width="2" height="1" fill="#C0C0C0"/>
  <rect x="20" y="8" width="2" height="1" fill="#C0C0C0"/>
</svg>